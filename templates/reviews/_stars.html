{% comment %}
Compact rating badge. Expects `rating` = {"average": float|None, "count": int}.
Usage: {% include "reviews/_stars.html" with rating=t.bus.rating %}
{% endcomment %}
{% if rating.average %}
  <span class="inline-flex items-center gap-1 rounded-md bg-amber-50 px-1.5 py-0.5 text-xs font-semibold text-amber-700">
    <span aria-hidden="true">★</span>{{ rating.average }}
    <span class="font-normal text-amber-600/70">({{ rating.count }})</span>
  </span>
{% else %}
  <span class="text-xs font-medium text-slate-400">No ratings yet</span>
{% endif %}
