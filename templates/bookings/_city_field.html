{% comment %}Searchable city combobox. Params: field, label, value, placeholder.
Behaviour is wired up by the shared combobox script in base.html.{% endcomment %}
<div class="relative" data-combobox>
  <label class="label">{{ label }}</label>
  <div class="relative">
    <svg class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg>
    <input type="text" name="{{ field }}" value="{{ value }}" placeholder="{{ placeholder }}"
           autocomplete="off" role="combobox" aria-autocomplete="list" aria-expanded="false"
           data-combobox-input
           class="input pl-9">
  </div>
  <ul data-combobox-list
      class="hidden absolute z-30 left-0 right-0 mt-1 max-h-60 overflow-auto rounded-xl border border-slate-200 bg-white shadow-lg text-sm"></ul>
</div>
